name: Deploy the Flask app

on:
    workflow_dispatch:

jobs:
    deploy:
        env: 
            DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        runs-on: self-hosted

        steps:
            - name: Checkout the code
              uses: actions/checkout@v4

            - name: deploy with docker compose
              run: docker compose up -d --build
