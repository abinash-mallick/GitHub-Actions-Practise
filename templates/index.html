<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Motivation App</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:12px;
    width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#333;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:30px;
}

.quote-box{
    background:#f5f7fb;
    padding:20px;
    border-radius:8px;
    font-size:20px;
    color:#444;
    font-style:italic;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    background:#667eea;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#5563c1;
}

footer{
    margin-top:25px;
    font-size:12px;
    color:#999;
}

</style>

</head>

<body>

<div class="container">

<h1>🌟 Motivation App</h1>
<p class="subtitle">Get your daily inspiration</p>

<div class="quote-box">
    "{{ quote }}"
</div>

<form method="get">
    <button type="submit">New Quote</button>
</form>

<footer>
Built with Python Flask
</footer>

</div>

</body>
</html>
